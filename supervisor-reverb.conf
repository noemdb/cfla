[program:cfla-reverb]
command=php /home/nuser/code/cfla/artisan reverb:start --host=127.0.0.1 --port=8090
directory=/home/nuser/code/cfla
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=nuser
numprocs=1
redirect_stderr=true
stdout_logfile=/home/nuser/code/cfla/storage/logs/reverb.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
